<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowGenie</title>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f9f9fb;
            color: #111827;
            min-height: 100vh;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 140px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .header p {
            margin: 10px 0 0;
            font-size: 15px;
            color: #6b7280;
        }

        .output-card {
            width: 100%;
            max-width: 1050px;
            min-height: 420px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
            padding: 28px;
            transition: all 0.25s ease;
        }

        #output {
            width: 100%;
            overflow-x: auto;
            animation: fadeIn 0.35s ease;
        }

        .empty-state {
            min-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #6b7280;
            font-size: 16px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #6b7280;
            font-size: 15px;
            min-height: 120px;
        }

        .dots {
            display: inline-flex;
            gap: 5px;
        }

        .dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #9ca3af;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        .controls-row {
            width: 100%;
            max-width: 1050px;
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
            margin-bottom: 4px;
        }

        .clear-btn {
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #374151;
            border-radius: 12px;
            padding: 9px 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .clear-btn:hover {
            background: #f3f4f6;
        }

        .input-bar-wrapper {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            width: min(920px, calc(100% - 28px));
            z-index: 10;
        }

        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 26px;
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
            padding: 12px 14px 12px 18px;
        }

        #inputText {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #111827;
            min-height: 24px;
            max-height: 140px;
            line-height: 1.5;
            overflow-y: auto;
        }

        #inputText::placeholder {
            color: #9ca3af;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #111827;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s ease, background 0.2s ease;
        }

        .send-btn:hover {
            background: #1f2937;
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        .footer-note {
            text-align: center;
            margin-top: 10px;
            font-size: 12.5px;
            color: #9ca3af;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.7);
                opacity: 0.6;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .page {
                padding: 28px 14px 128px;
            }

            .header h1 {
                font-size: 32px;
            }

            .header p {
                font-size: 14px;
            }

            .output-card {
                padding: 18px;
                min-height: 340px;
                border-radius: 20px;
            }

            .input-bar {
                padding: 10px 12px 10px 14px;
                border-radius: 22px;
            }

            .send-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>FlowGenie</h1>
            <p>Turn plain prompts into clean flowcharts</p>
        </div>

        <div class="output-card">
            <div id="output">
                <div class="empty-state">Your flowchart will appear here.</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="clear-btn" onclick="clearFlowchart()">Clear</button>
        </div>
    </div>

    <div class="input-bar-wrapper">
        <div class="input-bar">
            <textarea id="inputText" placeholder="Describe the flowchart you want..."></textarea>
            <button class="send-btn" onclick="generate()" aria-label="Generate flowchart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="footer-note">Press Enter to generate • Shift + Enter for new line</div>
    </div>

    <script>
        mermaid.initialize({ startOnLoad: false });
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
